<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kai的胖丁 - 像素电子宠物</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #e0e0e0;
    overflow: hidden;
  }
  .stars { position: fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:0; }
  .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--duration) ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.2} 50%{opacity:1} }

  .container { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:16px; }
  .pet-name { font-size:28px; font-weight:700; color:#f0c27f; text-shadow:0 0 20px rgba(240,194,127,.3); font-family:'Courier New',monospace; letter-spacing:2px; }
  .status-bars { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
  .status-item { display:flex; flex-direction:column; align-items:center; gap:6px; min-width:90px; }
  .status-label { font-size:13px; color:#aaa; display:flex; align-items:center; gap:4px; }
  .status-bar-bg { width:90px; height:10px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; border:1px solid rgba(255,255,255,.15); }
  .status-bar-fill { height:100%; border-radius:1px; transition: width .5s ease, background .5s ease; }

  .pet-scene { position:relative; width:320px; height:200px; display:flex; align-items:center; justify-content:center; }
  .pet-glow { position:absolute; width:200px; height:140px; border-radius:50%; background:radial-gradient(circle,rgba(240,194,127,.12) 0%,transparent 70%); animation:glow-pulse 3s ease-in-out infinite; }
  @keyframes glow-pulse { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.3);opacity:1} }

  .pixel-cat-wrapper { position:relative; cursor:pointer; user-select:none; }
  canvas#catCanvas { image-rendering:pixelated; image-rendering:crisp-edges; width:288px; height:180px; transition: transform .3s ease; }

  .thought-bubble { position:absolute; top:-40px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,.95); color:#333; padding:8px 14px; border-radius:4px; font-size:14px; white-space:nowrap; opacity:0; transition:opacity .3s,transform .3s; pointer-events:none; box-shadow:0 2px 8px rgba(0,0,0,.2); border:2px solid #333; font-family:'Courier New',monospace; z-index:20; }
  .thought-bubble.show { opacity:1; transform:translateX(-50%) translateY(-8px); }
  .thought-bubble::after { content:''; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent; border-top:8px solid #333; }

  .actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .action-btn { padding:10px 18px; border:2px solid rgba(255,255,255,.3); border-radius:4px; font-size:14px; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:6px; font-weight:600; font-family:'Courier New',monospace; }
  .action-btn:hover { transform:translateY(-2px); box-shadow:0 4px 15px rgba(0,0,0,.3); }
  .action-btn:active { transform:translateY(0); }
  .btn-feed { background:#e8a87c; color:#2d1810; border-color:#c4956a; }
  .btn-play { background:#7ec8e3; color:#1a3a4a; border-color:#5ab0d0; }
  .btn-sleep { background:#b8a9c9; color:#2d1f3d; border-color:#9a8bb0; }
  .btn-pet { background:#f7c5c5; color:#4a2020; border-color:#e0a0a0; }
  .btn-code { background:#a8d5ba; color:#1a3d2a; border-color:#88c0a0; }

  .mood-text { font-size:14px; color:#999; text-align:center; min-height:20px; font-family:'Courier New',monospace; }
  .level-badge { font-size:13px; background:rgba(240,194,127,.2); color:#f0c27f; padding:4px 14px; border-radius:2px; border:1px solid rgba(240,194,127,.3); font-family:'Courier New',monospace; }

  .float-emoji { position:absolute; font-size:24px; pointer-events:none; animation:float-up 1.5s ease-out forwards; z-index:10; }
  @keyframes float-up { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(1.5)} }
  .zzz { position:absolute; font-size:20px; color:#b8a9c9; font-family:'Courier New',monospace; font-weight:bold; animation:zzz-float 2s ease-in-out infinite; opacity:0; }
  @keyframes zzz-float { 0%{opacity:0;transform:translate(0,0) rotate(0)} 30%{opacity:1} 100%{opacity:0;transform:translate(30px,-50px) rotate(20deg)} }
  .bounce { animation: bounce .5s ease; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 30%{transform:translateY(-20px)} 60%{transform:translateY(-8px)} }
  .wiggle { animation: wiggle .5s ease; }
  @keyframes wiggle { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-8deg)} 75%{transform:rotate(8deg)} }
  .ground { width:260px; height:4px; background:rgba(255,255,255,.08); border-radius:2px; margin-top:-8px; }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <div class="pet-name">~ 超级大胖子 ~</div>
  <div class="level-badge" id="levelBadge">Lv.1 小奶猫</div>
  <div class="status-bars">
    <div class="status-item"><span class="status-label">🐟 饱腹</span><div class="status-bar-bg"><div class="status-bar-fill" id="hungerBar" style="width:80%;background:linear-gradient(90deg,#e8a87c,#f0c27f)"></div></div></div>
    <div class="status-item"><span class="status-label">😺 心情</span><div class="status-bar-bg"><div class="status-bar-fill" id="happyBar" style="width:70%;background:linear-gradient(90deg,#7ec8e3,#a0e1f0)"></div></div></div>
    <div class="status-item"><span class="status-label">💤 精力</span><div class="status-bar-bg"><div class="status-bar-fill" id="energyBar" style="width:90%;background:linear-gradient(90deg,#b8a9c9,#d4c5e2)"></div></div></div>
    <div class="status-item"><span class="status-label">❤️ 亲密</span><div class="status-bar-bg"><div class="status-bar-fill" id="loveBar" style="width:30%;background:linear-gradient(90deg,#f7c5c5,#ffb3b3)"></div></div></div>
  </div>
  <div class="pet-scene" id="petScene">
    <div class="pet-glow"></div>
    <div class="pixel-cat-wrapper" id="petBody" onclick="petClick()">
      <canvas id="catCanvas" width="32" height="20"></canvas>
      <div class="thought-bubble" id="thought"></div>
    </div>
  </div>
  <div class="ground"></div>
  <div class="mood-text" id="moodText">小猫咪正看着你，喵~ 🐱</div>
  <div class="actions">
    <button class="action-btn btn-feed" onclick="feed()">🐟 喂鱼</button>
    <button class="action-btn btn-play" onclick="play()">🧶 玩耍</button>
    <button class="action-btn btn-sleep" onclick="sleep()">💤 睡觉</button>
    <button class="action-btn btn-pet" onclick="pet()">🤗 撸猫</button>
    <button class="action-btn btn-code" onclick="code()">💻 编程</button>
  </div>
</div>

<script>
const CW = 32, CH = 20;
const canvas = document.getElementById('catCanvas');
const ctx = canvas.getContext('2d');

const P = {
  o: '#2b2b2b', f: '#f0a050', l: '#f8c878', d: '#c88030',
  w: '#fff8f0', p: '#ffb0c0', n: '#e06080', e: '#2b2b2b',
  s: '#ffffff', b: '#ff8888', k: '#888888',
};

function px(x,y,c){ if(x<0||y<0||x>=CW||y>=CH)return; ctx.fillStyle=c; ctx.fillRect(x,y,1,1); }
function fRect(x1,y1,x2,y2,c){ ctx.fillStyle=c; ctx.fillRect(x1,y1,x2-x1+1,y2-y1+1); }
function hL(x1,x2,y,c){ for(let x=x1;x<=x2;x++)px(x,y,c); }
function vL(x,y1,y2,c){ for(let y=y1;y<=y2;y++)px(x,y,c); }

// ===================== STANDING CAT =====================
function drawStandingBase(){
  const {o,f,l,d,w,p,k} = P;

  // Head fill
  fRect(4,4,11,9,f);
  hL(4,11,4,l);

  // Body fill (merges with head at x=11)
  fRect(11,5,24,10,f);

  // Belly
  fRect(16,8,21,10,w);

  // Head outline
  hL(4,11,3,o);
  vL(3,4,9,o);
  px(4,10,o);
  hL(5,9,10,o);

  // Body outline
  hL(12,25,4,o);
  vL(25,5,10,o);
  hL(10,25,11,o);

  // Left ear
  px(5,1,o); px(6,1,o);
  px(4,2,o); px(5,2,f); px(6,2,f); px(7,2,o);
  px(5,3,f); px(6,3,p);

  // Right ear
  px(9,1,o); px(10,1,o);
  px(8,2,o); px(9,2,f); px(10,2,f); px(11,2,o);
  px(9,3,p); px(10,3,f);

  // Forehead stripes
  px(6,4,d); px(8,4,d); px(10,4,d);
  px(7,5,d); px(9,5,d);

  // 4 Legs (2px wide each)
  [[11,12],[14,12],[20,12],[23,12]].forEach(([lx,ly])=>{
    fRect(lx,ly,lx+1,ly+2,f);
    fRect(lx,ly+3,lx+1,ly+3,w);
    fRect(lx,ly+4,lx+1,ly+4,o);
  });

  // Whiskers
  px(1,6,k); px(2,6,k);
  px(1,8,k); px(2,8,k);
}

function drawTail(frame){
  const {o,f} = P;
  if(frame%2===0){
    px(25,4,f); px(26,3,o); px(26,4,f);
    px(27,2,o); px(27,3,f);
    px(28,1,o); px(28,2,f);
    px(29,0,o); px(29,1,f);
  } else {
    px(26,4,o); px(26,5,f);
    px(27,3,o); px(27,4,f);
    px(28,2,o); px(28,3,f);
    px(29,1,o); px(29,2,f);
    px(30,1,o);
  }
}

function drawNose(){ px(7,7,P.n); px(8,7,P.n); }

function drawEyesNormal(){
  const {e,s}=P;
  px(5,5,e);px(6,5,e); px(5,6,e);px(6,6,e); px(6,5,s);
  px(9,5,e);px(10,5,e); px(9,6,e);px(10,6,e); px(10,5,s);
}
function drawEyesHappy(){
  const {e}=P;
  px(5,6,e);px(6,6,e); px(4,5,e);px(7,5,e);
  px(9,6,e);px(10,6,e); px(8,5,e);px(11,5,e);
}
function drawEyesSad(){
  const {e,s}=P;
  px(5,5,e);px(6,5,e); px(5,6,e);px(6,6,e); px(5,7,e);px(6,7,e); px(6,5,s);
  px(9,5,e);px(10,5,e); px(9,6,e);px(10,6,e); px(9,7,e);px(10,7,e); px(10,5,s);
  px(4,4,P.o); px(7,5,P.o);
  px(11,4,P.o); px(8,5,P.o);
}

function drawMouthNormal(){
  const {o}=P;
  px(7,8,o); px(8,8,o);
  px(6,9,o); px(9,9,o);
}
function drawMouthHappy(){
  const {o}=P;
  px(6,8,o); px(9,8,o);
  hL(6,9,9,o);
}
function drawMouthSad(){
  const {o}=P;
  hL(6,9,9,o);
  px(6,8,o); px(9,8,o);
}
function drawMouthEating(){
  const {o,n}=P;
  px(6,8,o); px(9,8,o);
  px(6,9,o); px(9,9,o);
  px(7,9,n); px(8,9,n);
  px(7,10,o); px(8,10,o);
}
function drawBlush(){
  const {b}=P;
  px(4,7,b); px(4,8,b);
  px(11,7,b); px(11,8,b);
}

// ===================== SLEEPING CAT (curled) =====================
function drawSleepingCat(){
  const {o,f,l,d,w,p,n,e,k}=P;

  // Body oval outline
  hL(12,20,6,o);
  px(11,7,o); px(21,7,o);
  px(10,8,o); px(22,8,o);
  px(9,9,o); px(23,9,o);
  px(9,10,o); px(23,10,o);
  px(9,11,o); px(23,11,o);
  px(9,12,o); px(23,12,o);
  px(10,13,o); px(22,13,o);
  px(11,14,o); px(21,14,o);
  hL(12,20,15,o);

  // Body fill
  hL(12,20,7,f);
  hL(11,21,8,f);
  fRect(10,9,22,12,f);
  hL(11,21,13,f);
  hL(12,20,14,f);

  // Head area (lighter fur, left side)
  fRect(12,7,16,8,l);

  // Ears (small)
  px(12,5,o); px(13,5,o);
  px(12,6,f); px(13,6,p);
  px(16,5,o); px(17,5,o);
  px(16,6,p); px(17,6,f);

  // Forehead stripes
  px(14,7,d); px(15,7,d);

  // Closed eyes
  hL(12,13,9,e); hL(16,17,9,e);

  // Nose
  px(14,10,n); px(15,10,n);

  // Small mouth (peaceful)
  px(14,11,o); px(15,11,o);

  // Belly (white patch, right side)
  fRect(17,11,20,13,w);

  // Paws tucked (visible at front-bottom)
  px(12,13,w); px(13,13,w); px(14,13,w);

  // Tail wrapping around bottom-right
  px(21,14,f); px(22,13,f); px(23,12,f);
  px(22,14,o); px(23,13,o); px(24,12,o);
  px(24,11,o); px(24,10,f);

  // Whiskers
  px(8,9,k); px(8,10,k);
}

// ===================== RENDER =====================
let currentExpression = 'normal';
let tailFrame = 0;
let eatingTimeout = null;

function renderCat(){
  ctx.clearRect(0,0,CW,CH);
  if(state.sleeping){
    drawSleepingCat();
    canvas.style.transform = `scaleY(${1 + Math.sin(Date.now()/1000)*0.015})`;
  } else {
    canvas.style.transform = '';
    drawStandingBase();
    drawTail(tailFrame);
    drawNose();
    switch(currentExpression){
      case 'happy':  drawEyesHappy(); drawMouthHappy(); drawBlush(); break;
      case 'sad':    drawEyesSad();   drawMouthSad();   break;
      case 'eating': drawEyesHappy(); drawMouthEating(); break;
      case 'love':   drawEyesHappy(); drawMouthHappy(); drawBlush(); break;
      default:       drawEyesNormal();drawMouthNormal();
    }
  }
}

setInterval(()=>{ tailFrame++; renderCat(); }, 500);

// ===================== GAME STATE =====================
const state = { hunger:80, happy:70, energy:90, love:30, exp:0, level:1, sleeping:false, busy:false };
const levelNames = ['小奶猫','调皮猫','好伙伴','代码猫','黑客猫','编程大师','猫中之王','传说喵神'];
const thoughts = {
  hungry:['喵...好饿...🐟','想吃小鱼干...','肚子咕咕叫了喵~'],
  sad:['喵呜...无聊...','想你陪我玩~','今天不开心喵'],
  tired:['好困喵...💤','打哈欠~','想睡觉了喵...'],
  happy:['喵~好开心！','呼噜呼噜~ ❤️','蹭蹭~','最喜欢你了喵！'],
  code:['print("喵!")','git commit -m "喵"','import 小鱼干','正在debug喵...','0 bugs 喵！'],
  idle:['喵?','...盯...','舔毛中~','(打哈欠)','喵呜~♪','蹭~蹭~']
};

function createStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<50;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*3+1;s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--duration:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s;`;c.appendChild(s);}
}
createStars();

function clamp(v,mn=0,mx=100){return Math.max(mn,Math.min(mx,v));}
function updateBars(){
  [['hungerBar',state.hunger,'#e8a87c','#f0c27f'],['happyBar',state.happy,'#7ec8e3','#a0e1f0'],['energyBar',state.energy,'#b8a9c9','#d4c5e2'],['loveBar',state.love,'#f7c5c5','#ffb3b3']].forEach(([id,v,c1,c2])=>{const el=document.getElementById(id);el.style.width=v+'%';el.style.background=v<30?'#e74c3c':`linear-gradient(90deg,${c1},${c2})`;});
}
function updateLevel(){
  const nl=Math.min(Math.floor(state.exp/50)+1,levelNames.length);
  state.level=nl;
  document.getElementById('levelBadge').textContent=`Lv.${nl} ${levelNames[nl-1]}`;
}
function updateExpression(){
  if(state.sleeping){currentExpression='sleepy';return;}
  if(currentExpression==='eating'||currentExpression==='love')return;
  if(state.happy>70)currentExpression='happy';
  else if(state.happy<30||state.hunger<20)currentExpression='sad';
  else currentExpression='normal';
}
function showThought(t){const el=document.getElementById('thought');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function setMood(t){document.getElementById('moodText').textContent=t;}
function floatEmoji(em){const s=document.getElementById('petScene'),el=document.createElement('div');el.className='float-emoji';el.textContent=em;el.style.left=(Math.random()*60+20)+'%';el.style.top='40%';s.appendChild(el);setTimeout(()=>el.remove(),1500);}
function animatePet(cls){const b=document.getElementById('petBody');b.classList.remove('bounce','wiggle');void b.offsetWidth;b.classList.add(cls);setTimeout(()=>b.classList.remove(cls),600);}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}

function doAction(cb){
  if(state.busy)return;
  state.busy=true; cb();
  updateBars(); updateExpression(); updateLevel(); renderCat();
  setTimeout(()=>{state.busy=false;},800);
}

function feed(){doAction(()=>{
  if(state.sleeping){showThought('zzZ...别吵喵...');setMood('猫咪在睡觉，别打扰它~ 💤');return;}
  if(state.hunger>=100){showThought('吃不下了喵...');setMood('猫咪已经饱饱的了！');return;}
  state.hunger=clamp(state.hunger+20); state.happy=clamp(state.happy+5); state.exp+=3;
  currentExpression='eating'; renderCat();
  if(eatingTimeout)clearTimeout(eatingTimeout);
  eatingTimeout=setTimeout(()=>{currentExpression='normal';updateExpression();renderCat();},1500);
  floatEmoji('🐟'); animatePet('bounce'); showThought('好吃喵！🐟'); setMood('猫咪吃得很开心！呼噜呼噜~');
});}

function play(){doAction(()=>{
  if(state.sleeping){showThought('zzZ...');setMood('猫咪在睡觉呢~');return;}
  if(state.energy<15){showThought('太累了喵...');setMood('猫咪太累了，需要休息！');return;}
  state.happy=clamp(state.happy+20); state.energy=clamp(state.energy-15); state.hunger=clamp(state.hunger-8); state.love=clamp(state.love+5); state.exp+=5;
  floatEmoji('🧶'); floatEmoji('⭐'); animatePet('wiggle'); showThought(rnd(thoughts.happy)); setMood('猫咪追着毛线球玩得不亦乐乎！🧶');
});}

function sleep(){doAction(()=>{
  if(state.sleeping){
    state.sleeping=false; currentExpression='normal';
    showThought('喵~早安！☀️'); setMood('猫咪伸了个大懒腰，醒了！'); clearZzz(); return;
  }
  state.sleeping=true; state.energy=clamp(state.energy+30); state.exp+=2;
  currentExpression='sleepy'; showThought('晚安喵...💤'); setMood('猫咪蜷成一团，呼呼大睡~ zzZ...'); startZzz();
});}

let zzzInterval;
function startZzz(){
  const s=document.getElementById('petScene');
  zzzInterval=setInterval(()=>{const z=document.createElement('div');z.className='zzz';z.textContent='Z';z.style.left='65%';z.style.top='25%';z.style.animationDelay=Math.random()*.5+'s';s.appendChild(z);setTimeout(()=>z.remove(),2000);},1200);
}
function clearZzz(){clearInterval(zzzInterval);document.querySelectorAll('.zzz').forEach(z=>z.remove());}

function pet(){doAction(()=>{
  if(state.sleeping){state.sleeping=false;currentExpression='normal';clearZzz();showThought('喵?! 被摸醒了 😳');setMood('猫咪被你摸醒了！');return;}
  state.love=clamp(state.love+10); state.happy=clamp(state.happy+8); state.exp+=4;
  currentExpression='love'; renderCat();
  setTimeout(()=>{if(currentExpression==='love'){currentExpression='normal';updateExpression();renderCat();}},2000);
  floatEmoji('❤️'); animatePet('wiggle');
  showThought(rnd(['呼噜呼噜~ ❤️','蹭蹭...😊','再摸摸喵~','最喜欢你了喵！']));
  setMood('猫咪开心地呼噜呼噜~ 💕');
});}

function code(){doAction(()=>{
  if(state.sleeping){showThought('梦里在debug喵...');setMood('猫咪连做梦都在踩键盘 😂');return;}
  if(state.energy<10){showThought('脑子转不动了喵...');setMood('猫咪太累了，写不动代码了');return;}
  state.energy=clamp(state.energy-10); state.happy=clamp(state.happy+10); state.hunger=clamp(state.hunger-5); state.love=clamp(state.love+3); state.exp+=8;
  floatEmoji('💻'); floatEmoji('✨'); animatePet('bounce'); showThought(rnd(thoughts.code)); setMood('猫咪在键盘上疯狂踩踩！代码质量 MAX！');
});}

function petClick(){
  if(state.busy||state.sleeping)return;
  floatEmoji('✨'); animatePet('bounce'); showThought(rnd(thoughts.idle));
}

setInterval(()=>{
  if(state.sleeping){state.energy=clamp(state.energy+2);}
  else{state.hunger=clamp(state.hunger-1.5);state.happy=clamp(state.happy-.8);state.energy=clamp(state.energy-.5);}
  updateBars(); updateExpression(); renderCat();
},5000);

setInterval(()=>{
  if(state.busy||state.sleeping)return;
  if(state.hunger<20){showThought(rnd(thoughts.hungry));setMood('猫咪饿了，快喂喂它！🐟');}
  else if(state.energy<20){showThought(rnd(thoughts.tired));setMood('猫咪累了，让它休息一下吧~ 💤');}
  else if(state.happy<30){showThought(rnd(thoughts.sad));setMood('猫咪不太开心，陪它玩玩吧~');}
  else{showThought(rnd(thoughts.idle));}
},12000);

updateBars(); updateExpression(); renderCat();
</script>
