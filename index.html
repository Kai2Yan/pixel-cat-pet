<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kai的胖丁 - 像素电子宠物</title>
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  color:#e0e0e0;overflow-x:hidden;overflow-y:auto;
  padding:16px 8px 30px;
  background:linear-gradient(160deg,#0b0b2a 0%,#1b1145 25%,#0e2a4a 50%,#162040 75%,#0a1628 100%);
  background-size:400% 400%;animation:bg-flow 20s ease infinite;
}
@keyframes bg-flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.stars{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;transition:opacity 3s;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--duration) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}

.weather-layer{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:1;overflow:hidden;}
.raindrop{position:absolute;width:2px;background:linear-gradient(transparent,rgba(174,194,224,.6));animation:rain-fall linear infinite;}
@keyframes rain-fall{0%{transform:translateY(-10px)}100%{transform:translateY(100vh)}}
.snowflake{position:absolute;background:white;border-radius:50%;opacity:.8;animation:snow-fall linear infinite;}
@keyframes snow-fall{0%{transform:translateY(-10px) rotate(0deg)}100%{transform:translateY(100vh) rotate(360deg)}}
.sun-rays{position:fixed;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,236,139,.3) 0%,transparent 70%);pointer-events:none;z-index:1;animation:sun-pulse 4s ease-in-out infinite;}
@keyframes sun-pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.2);opacity:1}}

.container{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:420px;
  background:rgba(10,15,35,.72);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px 14px 12px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);}

.top-row{display:flex;align-items:center;justify-content:space-between;width:100%;gap:8px;}
.pet-name{font-size:20px;font-weight:700;color:#f0c27f;text-shadow:0 0 16px rgba(240,194,127,.2);font-family:'Courier New',monospace;letter-spacing:1px;}
.coin-display{font-size:14px;font-family:'Courier New',monospace;background:rgba(255,215,0,.1);color:#ffd700;padding:3px 10px;border-radius:5px;border:1px solid rgba(255,215,0,.2);display:flex;align-items:center;gap:4px;white-space:nowrap;}
.coin-display .coin-icon{display:inline-block;width:14px;height:14px;background:radial-gradient(circle,#ffd700,#daa520);border-radius:50%;border:1px solid #b8860b;line-height:14px;text-align:center;font-size:9px;color:#8b6914;font-weight:bold;}

.info-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;width:100%;}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-family:'Courier New',monospace;white-space:nowrap;}
.level-badge{background:rgba(240,194,127,.15);color:#f0c27f;border:1px solid rgba(240,194,127,.2);}
.weather-badge{background:rgba(255,255,255,.06);color:#999;border:1px solid rgba(255,255,255,.1);}
.time-badge{background:rgba(255,255,255,.06);color:#999;border:1px solid rgba(255,255,255,.1);}
.streak-badge{background:rgba(255,100,100,.1);color:#ff9999;border:1px solid rgba(255,100,100,.15);}

.status-bars{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;width:100%;padding:0 8px;}
.status-item{display:flex;align-items:center;gap:6px;}
.status-label{font-size:11px;color:#888;display:flex;align-items:center;gap:2px;min-width:52px;white-space:nowrap;}
.status-bar-bg{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.status-bar-fill{height:100%;border-radius:3px;transition:width .5s ease,background .5s ease;}

.pet-scene{position:relative;width:300px;height:190px;display:flex;align-items:center;justify-content:center;}
.pet-glow{position:absolute;width:180px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(240,194,127,.1) 0%,transparent 70%);animation:glow-pulse 3s ease-in-out infinite;}
@keyframes glow-pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.3);opacity:1}}

.pixel-cat-wrapper{position:relative;cursor:pointer;user-select:none;}
.cat-img-container{position:relative;width:200px;height:180px;display:flex;align-items:center;justify-content:center;}
#catImg{max-width:100%;max-height:100%;object-fit:contain;transition:opacity .35s ease;image-rendering:auto;}

@keyframes cat-breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes cat-bounce{0%{transform:scale(1)}30%{transform:scale(1.1)}60%{transform:scale(.95)}100%{transform:scale(1)}}
@keyframes cat-wiggle{0%,100%{transform:rotate(0)}20%{transform:rotate(-4deg)}40%{transform:rotate(4deg)}60%{transform:rotate(-3deg)}80%{transform:rotate(2deg)}}
@keyframes cat-sleep{0%,100%{transform:scaleY(1) translateY(0)}50%{transform:scaleY(1.02) translateY(2px)}}
@keyframes cat-eat-nod{0%,100%{transform:rotate(0)}50%{transform:rotate(-6deg) translateY(3px)}}
@keyframes cat-code-type{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes term-blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes term-slide{0%{opacity:0;transform:translate(-50%,-50%) scale(.8)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}

.cat-state-normal #catImg{animation:cat-breathe 3s ease-in-out infinite;}
.cat-state-happy #catImg{animation:cat-bounce .5s ease;}
.cat-state-love #catImg{animation:cat-wiggle .5s ease;}
.cat-state-sleep #catImg{animation:cat-sleep 2.5s ease-in-out infinite;}
.cat-state-eat #catImg{animation:cat-eat-nod .6s ease 3;}
.cat-state-play #catImg{animation:cat-wiggle .6s ease 2;}
.cat-state-sad #catImg{filter:saturate(.85) brightness(.95);animation:cat-breathe 4s ease-in-out infinite;}
.cat-state-code #catImg{animation:cat-code-type .4s ease 4;}

.terminal-overlay{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(1);width:110px;background:rgba(10,22,40,.92);border-radius:6px;border:2px solid rgba(100,200,255,.4);box-shadow:0 0 20px rgba(0,150,255,.25);z-index:10;overflow:hidden;font-family:'Courier New',monospace;}
.cat-state-code .terminal-overlay{display:block;animation:term-slide .3s ease-out;}
.term-header{background:rgba(50,80,120,.6);color:rgba(150,200,255,.8);font-size:8px;padding:2px 6px;text-align:center;}
.term-body{padding:5px 7px;color:#4fc3f7;font-size:9px;line-height:1.5;min-height:45px;}
.term-body .cursor{animation:term-blink 1s step-end infinite;}

.cat-accessory-overlay{position:absolute;top:5px;left:50%;transform:translateX(-50%);font-size:28px;z-index:5;display:none;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3));pointer-events:none;}

.thought-bubble{position:absolute;top:-40px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);color:#333;padding:8px 14px;border-radius:4px;font-size:14px;white-space:nowrap;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.2);border:2px solid #333;font-family:'Courier New',monospace;z-index:20;}
.thought-bubble.show{opacity:1;transform:translateX(-50%) translateY(-8px);}
.thought-bubble::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #333;}

.top-right{display:flex;align-items:center;gap:8px;}
.sound-toggle{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0;color:#aaa;}
.sound-toggle:hover{background:rgba(255,255,255,.15);}

.tab-panels{width:100%;min-height:46px;}
.tab-panel{display:none;animation:tab-fade .25s ease;}
.tab-panel.active{display:block;}
@keyframes tab-fade{0%{opacity:0;transform:translateY(4px)}100%{opacity:1;transform:translateY(0)}}
.tab-bar{display:flex;width:100%;border-top:1px solid rgba(255,255,255,.06);padding-top:8px;gap:4px;}
.tab-btn{flex:1;padding:8px 0;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:'Courier New',monospace;cursor:pointer;transition:all .2s;color:#667;background:transparent;}
.tab-btn.active{background:rgba(240,194,127,.12);color:#f0c27f;}
.tab-btn:hover:not(.active){background:rgba(255,255,255,.05);color:#aaa;}

.actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.action-btn{padding:9px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-left:3px solid #888;border-radius:6px;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;font-weight:600;font-family:'Courier New',monospace;white-space:nowrap;color:#ddd;}
.action-btn:hover{background:rgba(255,255,255,.1);border-top-color:rgba(255,255,255,.18);border-right-color:rgba(255,255,255,.18);border-bottom-color:rgba(255,255,255,.18);}
.action-btn:active{transform:scale(.97);}
.btn-feed{border-left-color:#e8a87c;}
.btn-play{border-left-color:#7ec8e3;}
.btn-sleep{border-left-color:#b8a9c9;}
.btn-pet{border-left-color:#f7c5c5;}
.btn-code{border-left-color:#a8d5ba;}
.btn-shop{border-left-color:#ffeaa7;}
.btn-achieve{border-left-color:#fdcb6e;}
.btn-diary{border-left-color:#b2bec3;}
.btn-game{border-left-color:#fd79a8;}

.mood-text{font-size:12px;color:#777;text-align:center;min-height:16px;font-family:'Courier New',monospace;padding:0 4px;}

.float-emoji{position:absolute;font-size:24px;pointer-events:none;animation:float-up 1.5s ease-out forwards;z-index:10;}
@keyframes float-up{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.5)}}
.zzz{position:absolute;font-size:20px;color:#b8a9c9;font-family:'Courier New',monospace;font-weight:bold;animation:zzz-float 2s ease-in-out infinite;opacity:0;}
@keyframes zzz-float{0%{opacity:0;transform:translate(0,0) rotate(0)}30%{opacity:1}100%{opacity:0;transform:translate(30px,-50px) rotate(20deg)}}
.bounce{animation:bounce .5s ease;}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-20px)}60%{transform:translateY(-8px)}}
.wiggle{animation:wiggle .5s ease;}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
.ground{width:240px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:-6px;}

/* Modals */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal-overlay.show{display:flex;}
.modal{background:#14162a;border:1px solid rgba(255,255,255,.1);border-radius:12px;width:100%;max-width:380px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.1);font-family:'Courier New',monospace;}
.modal-header h3{font-size:18px;color:#f0c27f;}
.modal-close{background:none;border:none;color:#888;font-size:22px;cursor:pointer;padding:0 4px;line-height:1;}
.modal-close:hover{color:#fff;}
.modal-body{padding:16px;overflow-y:auto;flex:1;}

/* Shop */
.shop-item{display:flex;align-items:center;justify-content:space-between;padding:10px;border:1px solid rgba(255,255,255,.1);border-radius:6px;margin-bottom:8px;transition:background .2s;}
.shop-item:hover{background:rgba(255,255,255,.05);}
.shop-item-info{display:flex;align-items:center;gap:10px;}
.shop-item-icon{font-size:24px;width:36px;text-align:center;}
.shop-item-detail h4{font-size:14px;color:#eee;margin-bottom:2px;}
.shop-item-detail p{font-size:11px;color:#888;}
.shop-buy-btn{padding:5px 12px;border:1px solid rgba(255,215,0,.4);border-radius:3px;background:rgba(255,215,0,.15);color:#ffd700;font-size:12px;cursor:pointer;font-family:'Courier New',monospace;white-space:nowrap;transition:all .2s;}
.shop-buy-btn:hover{background:rgba(255,215,0,.3);}
.shop-buy-btn:disabled{opacity:.4;cursor:not-allowed;}
.shop-buy-btn.owned{background:rgba(100,255,100,.15);color:#88ff88;border-color:rgba(100,255,100,.3);cursor:default;}
.shop-section{font-size:13px;color:#f0c27f;margin:12px 0 8px;font-family:'Courier New',monospace;border-bottom:1px solid rgba(240,194,127,.2);padding-bottom:4px;}

/* Achievements */
.achieve-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:6px;margin-bottom:6px;border:1px solid rgba(255,255,255,.08);}
.achieve-item.locked{opacity:.4;filter:grayscale(1);}
.achieve-item.unlocked{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.05);}
.achieve-icon{font-size:28px;width:40px;text-align:center;}
.achieve-info h4{font-size:13px;color:#eee;margin-bottom:2px;}
.achieve-info p{font-size:11px;color:#888;}

/* Diary */
.diary-entry{padding:8px 10px;border-left:3px solid rgba(240,194,127,.3);margin-bottom:8px;background:rgba(255,255,255,.03);border-radius:0 4px 4px 0;}
.diary-time{font-size:10px;color:#666;margin-bottom:3px;font-family:'Courier New',monospace;}
.diary-text{font-size:13px;color:#ccc;}
.diary-empty{text-align:center;color:#666;padding:30px;font-size:13px;}

/* Minigame */
.game-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.game-overlay.show{display:flex;}
.game-hud{display:flex;gap:20px;font-family:'Courier New',monospace;font-size:16px;color:#ffd700;}
canvas#gameCanvas{border:2px solid rgba(255,255,255,.2);border-radius:4px;background:#0a1628;image-rendering:pixelated;touch-action:none;}
.game-over-screen{display:none;flex-direction:column;align-items:center;gap:12px;color:#fff;text-align:center;}
.game-over-screen.show{display:flex;}
.game-over-screen h2{font-size:28px;color:#ffd700;font-family:'Courier New',monospace;}
.game-over-screen p{font-size:16px;color:#ccc;}
.game-btn{padding:10px 24px;background:#fd79a8;color:#fff;border:2px solid #e05080;border-radius:4px;font-size:16px;cursor:pointer;font-family:'Courier New',monospace;transition:all .2s;}
.game-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(253,121,168,.4);}

/* Toast */
.toast-container{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast{padding:10px 16px;border-radius:6px;font-size:13px;font-family:'Courier New',monospace;animation:toast-in .4s ease,toast-out .4s ease 2.6s forwards;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:280px;}
.toast-achieve{background:linear-gradient(135deg,#2d1f00,#4a3500);color:#ffd700;border:1px solid rgba(255,215,0,.3);}
.toast-coin{background:linear-gradient(135deg,#1a2d00,#2d4a00);color:#a8ff50;border:1px solid rgba(168,255,80,.3);}
.toast-info{background:linear-gradient(135deg,#001a2d,#002d4a);color:#50d4ff;border:1px solid rgba(80,212,255,.3);}
@keyframes toast-in{0%{opacity:0;transform:translateX(50px)}100%{opacity:1;transform:translateX(0)}}
@keyframes toast-out{0%{opacity:1}100%{opacity:0;transform:translateY(-20px)}}

/* Accessory selector mini bar */
.accessory-bar{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;padding:0 4px;}
.accessory-bar:empty{display:none;}
.acc-btn{width:28px;height:28px;border:1px solid rgba(255,255,255,.12);border-radius:5px;background:rgba(255,255,255,.04);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0;}
.acc-btn:hover{background:rgba(255,255,255,.1);}
.acc-btn.active{border-color:#ffd700;background:rgba(255,215,0,.12);}
.acc-btn.locked{opacity:.25;cursor:not-allowed;}

/* Mobile */
@media(max-width:420px){
  .container{padding:12px 10px 10px;border-radius:12px;}
  .pet-name{font-size:18px;letter-spacing:1px;}
  .cat-img-container{width:160px;height:140px;}
  .pet-scene{width:260px;height:160px;}
  .action-btn{padding:7px 12px;font-size:12px;}
  .status-bars{gap:4px 10px;padding:0 4px;}
  .tab-bar{padding-top:6px;}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="weather-layer" id="weatherLayer"></div>
<div id="sunRays" style="display:none" class="sun-rays"></div>

<div class="container">
  <div class="top-row">
    <div class="pet-name">~ 超级大胖子 ~</div>
    <div class="top-right">
      <div class="coin-display"><span class="coin-icon">$</span> <span id="coinCount">0</span></div>
      <button class="sound-toggle" id="soundBtn" onclick="toggleSound()" title="音效">🔇</button>
    </div>
  </div>

  <div class="info-row">
    <div class="badge level-badge" id="levelBadge">Lv.1 小奶猫</div>
    <div class="badge weather-badge" id="weatherBadge">☀️ 晴天</div>
    <div class="badge time-badge" id="timeBadge">🌙 夜晚</div>
    <div class="badge streak-badge" id="streakBadge">🔥 1天</div>
  </div>

  <div class="status-bars">
    <div class="status-item"><span class="status-label">🐟 饱腹</span><div class="status-bar-bg"><div class="status-bar-fill" id="hungerBar" style="width:80%;background:linear-gradient(90deg,#e8a87c,#f0c27f)"></div></div></div>
    <div class="status-item"><span class="status-label">😺 心情</span><div class="status-bar-bg"><div class="status-bar-fill" id="happyBar" style="width:70%;background:linear-gradient(90deg,#7ec8e3,#a0e1f0)"></div></div></div>
    <div class="status-item"><span class="status-label">💤 精力</span><div class="status-bar-bg"><div class="status-bar-fill" id="energyBar" style="width:90%;background:linear-gradient(90deg,#b8a9c9,#d4c5e2)"></div></div></div>
    <div class="status-item"><span class="status-label">❤️ 亲密</span><div class="status-bar-bg"><div class="status-bar-fill" id="loveBar" style="width:30%;background:linear-gradient(90deg,#f7c5c5,#ffb3b3)"></div></div></div>
  </div>

  <div class="pet-scene" id="petScene">
    <div class="pet-glow"></div>
    <div class="pixel-cat-wrapper" id="petBody" onclick="petClick()">
      <div class="cat-img-container" id="catContainer">
        <img id="catImg" src="cat_normal.png" alt="cat">
        <div class="cat-accessory-overlay" id="catAccessory"></div>
        <div class="terminal-overlay" id="terminalOverlay">
          <div class="term-header">~ terminal</div>
          <div class="term-body" id="termBody"></div>
        </div>
      </div>
      <div class="thought-bubble" id="thought"></div>
    </div>
  </div>
  <div class="ground"></div>

  <div class="accessory-bar" id="accessoryBar"></div>

  <div class="mood-text" id="moodText">小猫咪正看着你，喵~ 🐱</div>

  <div class="tab-panels">
    <div class="tab-panel active" id="tabInteract">
      <div class="actions">
        <button class="action-btn btn-feed" onclick="feed()">🐟 喂鱼</button>
        <button class="action-btn btn-play" onclick="play()">🧶 玩耍</button>
        <button class="action-btn btn-sleep" onclick="sleep()">💤 睡觉</button>
        <button class="action-btn btn-pet" onclick="pet()">🤗 撸猫</button>
        <button class="action-btn btn-code" onclick="code()">💻 编程</button>
      </div>
    </div>
    <div class="tab-panel" id="tabMore">
      <div class="actions">
        <button class="action-btn btn-shop" onclick="toggleModal('shop')">🏪 商店</button>
        <button class="action-btn btn-achieve" onclick="toggleModal('achieve')">🏆 成就</button>
        <button class="action-btn btn-diary" onclick="toggleModal('diary')">📔 日记</button>
        <button class="action-btn btn-game" onclick="startMinigame()">🎮 小游戏</button>
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('interact')" id="tabBtnInteract">🐾 互动</button>
    <button class="tab-btn" onclick="switchTab('more')" id="tabBtnMore">📦 更多</button>
  </div>
</div>

<!-- Shop Modal -->
<div class="modal-overlay" id="shopOverlay" onclick="closeModalOnBg(event,'shop')">
  <div class="modal">

<div class="toast-container" id="toastContainer"></div>

<script>
// ===================== CAT IMAGE SYSTEM =====================
const catImgEl=document.getElementById('catImg');
const catContainer=document.getElementById('catContainer');
const termBody=document.getElementById('termBody');
const catAccEl=document.getElementById('catAccessory');
const catImages={normal:'cat_normal.png',sleep:'cat_sleep.png',eat:'cat_eat.png',play:'cat_play.png'};
const termLines=['$ git commit -m "喵"','print("hello 喵!")','import 小鱼干','0 errors ✓','$ npm run 撸猫','> compiling 鱼.js...','cat README.md 🐱','sudo apt install 猫粮'];
new Image().src=catImages.sleep;new Image().src=catImages.eat;new Image().src=catImages.play;

// (old canvas drawing functions removed — using images now)


// ===================== GAME STATE =====================
const defaultState={
  hunger:80,happy:70,energy:90,love:30,
  exp:0,level:1,sleeping:false,busy:false,
  coins:0,totalCoins:0,
  ownedAccessories:[],activeAccessory:null,
  achievements:[],
  diary:[],
  feedCount:0,playCount:0,petCount:0,codeCount:0,sleepCount:0,
  gameHighScore:0,
  soundOn:false,
  weather:'sunny',
  streak:1,lastVisit:null,
  createdAt:null,
};

let state;
const SAVE_KEY='pixelCatPet_v2';

function loadState(){
  try{
    const saved=localStorage.getItem(SAVE_KEY);
    if(saved){
      state={...defaultState,...JSON.parse(saved),busy:false};
      const today=new Date().toDateString();
      if(state.lastVisit){
        const last=new Date(state.lastVisit);
        const diff=Math.floor((new Date(today)-last)/(86400000));
        if(diff===1)state.streak++;
        else if(diff>1)state.streak=1;
      }
      state.lastVisit=today;
    } else{
      state={...defaultState,lastVisit:new Date().toDateString(),createdAt:Date.now()};
    }
  }catch(e){state={...defaultState,lastVisit:new Date().toDateString(),createdAt:Date.now()};}
}
function saveState(){
  try{
    const s={...state};delete s.busy;
    localStorage.setItem(SAVE_KEY,JSON.stringify(s));
  }catch(e){}
}

loadState();

const levelNames=['小奶猫','调皮猫','好伙伴','代码猫','黑客猫','编程大师','猫中之王','传说喵神'];
const thoughts={
  hungry:['喵...好饿...🐟','想吃小鱼干...','肚子咕咕叫了喵~'],
  sad:['喵呜...无聊...','想你陪我玩~','今天不开心喵'],
  tired:['好困喵...💤','打哈欠~','想睡觉了喵...'],
  happy:['喵~好开心！','呼噜呼噜~ ❤️','蹭蹭~','最喜欢你了喵！'],
  code:['print("喵!")','git commit -m "喵"','import 小鱼干','正在debug喵...','0 bugs 喵！'],
  idle:['喵?','...盯...','舔毛中~','(打哈欠)','喵呜~♪','蹭~蹭~']
};

// ===================== RENDER CAT =====================
let currentExpression='normal';
let eatingTimeout=null;
let codeTypingInterval=null;

function renderCat(){
  const prev=catContainer.className;
  let stateClass='cat-state-normal', imgSrc=catImages.normal;
  if(state.sleeping){
    stateClass='cat-state-sleep';imgSrc=catImages.sleep;
  }else{
    switch(currentExpression){
      case 'eating':stateClass='cat-state-eat';imgSrc=catImages.eat;break;
      case 'playing':stateClass='cat-state-play';imgSrc=catImages.play;break;
      case 'coding':stateClass='cat-state-code';imgSrc=catImages.normal;break;
      case 'sad':stateClass='cat-state-sad';imgSrc=catImages.normal;break;
      case 'happy':stateClass='cat-state-happy';imgSrc=catImages.normal;break;
      case 'love':stateClass='cat-state-love';imgSrc=catImages.normal;break;
      default:stateClass='cat-state-normal';imgSrc=catImages.normal;
    }
  }
  if(catImgEl.src.indexOf(imgSrc)===-1)catImgEl.src=imgSrc;
  const newClass='cat-img-container '+stateClass;
  if(prev!==newClass){
    catContainer.className=newClass;
    if(stateClass==='cat-state-code')startTermTyping();
    else stopTermTyping();
  }
  // Accessory overlay
  if(state.activeAccessory){
    const items=[{id:'crown',icon:'👑'},{id:'bowtie',icon:'🎀'},{id:'glasses',icon:'🤓'},{id:'scarf',icon:'🧣'},{id:'partyhat',icon:'🎉'},{id:'wizardhat',icon:'🧙'},{id:'flower',icon:'🌸'},{id:'halo',icon:'😇'}];
    const acc=items.find(a=>a.id===state.activeAccessory);
    if(acc){catAccEl.textContent=acc.icon;catAccEl.style.display='block';}
    else catAccEl.style.display='none';
  }else{catAccEl.style.display='none';}
}

function startTermTyping(){
  const el=termBody;
  el.innerHTML='';
  let line=0;
  codeTypingInterval=setInterval(()=>{
    if(line>=4){stopTermTyping();return;}
    const txt=termLines[Math.floor(Math.random()*termLines.length)];
    el.innerHTML+=txt+'<br>';
    if(line===3)el.innerHTML+='<span class="cursor">█</span>';
    line++;
  },500);
}
function stopTermTyping(){if(codeTypingInterval){clearInterval(codeTypingInterval);codeTypingInterval=null;}}

renderCat();

// ===================== SOUND SYSTEM =====================
let audioCtx=null;
function getAudioCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playMeow(){
  if(!state.soundOn)return;
  try{
    const ctx=getAudioCtx(),now=ctx.currentTime;
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(800,now);
    osc.frequency.exponentialRampToValueAtTime(500,now+0.15);
    osc.frequency.exponentialRampToValueAtTime(700,now+0.25);
    gain.gain.setValueAtTime(0.15,now);
    gain.gain.exponentialRampToValueAtTime(0.01,now+0.3);
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start(now);osc.stop(now+0.3);
  }catch(e){}
}
function playPurr(){
  if(!state.soundOn)return;
  try{
    const ctx=getAudioCtx(),now=ctx.currentTime;
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.type='sawtooth';osc.frequency.setValueAtTime(50,now);
    gain.gain.setValueAtTime(0.05,now);
    gain.gain.setValueAtTime(0.08,now+0.1);
    gain.gain.exponentialRampToValueAtTime(0.01,now+0.6);
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start(now);osc.stop(now+0.6);
  }catch(e){}
}
function playEat(){
  if(!state.soundOn)return;
  try{
    const ctx=getAudioCtx(),now=ctx.currentTime;
    [0,0.1,0.2].forEach(d=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.type='square';osc.frequency.setValueAtTime(300+Math.random()*200,now+d);
      gain.gain.setValueAtTime(0.08,now+d);gain.gain.exponentialRampToValueAtTime(0.01,now+d+0.08);
      osc.connect(gain);gain.connect(ctx.destination);osc.start(now+d);osc.stop(now+d+0.08);
    });
  }catch(e){}
}
function playCoin(){
  if(!state.soundOn)return;
  try{
    const ctx=getAudioCtx(),now=ctx.currentTime;
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.type='sine';osc.frequency.setValueAtTime(988,now);osc.frequency.setValueAtTime(1319,now+0.1);
    gain.gain.setValueAtTime(0.12,now);gain.gain.exponentialRampToValueAtTime(0.01,now+0.25);
    osc.connect(gain);gain.connect(ctx.destination);osc.start(now);osc.stop(now+0.25);
  }catch(e){}
}
function playAchieve(){
  if(!state.soundOn)return;
  try{
    const ctx=getAudioCtx(),now=ctx.currentTime;
    [523,659,784,1047].forEach((f,i)=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.type='sine';osc.frequency.setValueAtTime(f,now+i*0.12);
      gain.gain.setValueAtTime(0.1,now+i*0.12);gain.gain.exponentialRampToValueAtTime(0.01,now+i*0.12+0.2);
      osc.connect(gain);gain.connect(ctx.destination);osc.start(now+i*0.12);osc.stop(now+i*0.12+0.2);
    });
  }catch(e){}
}

function toggleSound(){
  state.soundOn=!state.soundOn;
  document.getElementById('soundBtn').textContent=state.soundOn?'🔊':'🔇';
  if(state.soundOn){getAudioCtx();playMeow();}
  saveState();
}

// ===================== UI HELPERS =====================
function clamp(v,mn=0,mx=100){return Math.max(mn,Math.min(mx,v));}
function updateBars(){
  [['hungerBar',state.hunger,'#e8a87c','#f0c27f'],['happyBar',state.happy,'#7ec8e3','#a0e1f0'],['energyBar',state.energy,'#b8a9c9','#d4c5e2'],['loveBar',state.love,'#f7c5c5','#ffb3b3']].forEach(([id,v,c1,c2])=>{
    const el=document.getElementById(id);el.style.width=v+'%';el.style.background=v<30?'#e74c3c':`linear-gradient(90deg,${c1},${c2})`;
  });
}
function updateLevel(){
  const nl=Math.min(Math.floor(state.exp/50)+1,levelNames.length);
  if(nl>state.level){showToast(`🎉 升级到 Lv.${nl} ${levelNames[nl-1]}！`,'achieve');playAchieve();}
  state.level=nl;
  document.getElementById('levelBadge').textContent=`Lv.${nl} ${levelNames[nl-1]}`;
}
function updateExpression(){
  if(state.sleeping){currentExpression='sleepy';return;}
  if(currentExpression==='eating'||currentExpression==='love'||currentExpression==='playing'||currentExpression==='coding')return;
  if(state.happy>70)currentExpression='happy';
  else if(state.happy<30||state.hunger<20)currentExpression='sad';
  else currentExpression='normal';
}
function updateCoins(){document.getElementById('coinCount').textContent=state.coins;}
function updateStreak(){document.getElementById('streakBadge').textContent=`🔥 ${state.streak}天`;}

function showThought(t){const el=document.getElementById('thought');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function setMood(t){document.getElementById('moodText').textContent=t;}
function floatEmoji(em){const s=document.getElementById('petScene'),el=document.createElement('div');el.className='float-emoji';el.textContent=em;el.style.left=(Math.random()*60+20)+'%';el.style.top='40%';s.appendChild(el);setTimeout(()=>el.remove(),1500);}
function animatePet(cls){const b=document.getElementById('petBody');b.classList.remove('bounce','wiggle');void b.offsetWidth;b.classList.add(cls);setTimeout(()=>b.classList.remove(cls),600);}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}

function addCoins(n){state.coins+=n;state.totalCoins+=n;updateCoins();if(n>0){playCoin();showToast(`+${n} 金币`,'coin');}}

function showToast(msg,type='info'){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');t.className=`toast toast-${type}`;t.textContent=msg;
  c.appendChild(t);setTimeout(()=>t.remove(),3200);
}

// ===================== DIARY =====================
function addDiary(text){
  const entry={time:Date.now(),text};
  state.diary.unshift(entry);
  if(state.diary.length>50)state.diary.pop();
}
function renderDiary(){
  const body=document.getElementById('diaryBody');
  if(!state.diary.length){body.innerHTML='<div class="diary-empty">还没有日记，快去和猫咪互动吧~</div>';return;}
  body.innerHTML=state.diary.map(e=>{
    const d=new Date(e.time);
    const ts=`${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    return `<div class="diary-entry"><div class="diary-time">${ts}</div><div class="diary-text">${e.text}</div></div>`;
  }).join('');
}

// ===================== ACHIEVEMENTS =====================
const achievementDefs=[
  {id:'first_feed',icon:'🐟',name:'初次投喂',desc:'第一次喂猫咪',check:s=>s.feedCount>=1},
  {id:'feed_master',icon:'🍣',name:'美食家',desc:'喂食 20 次',check:s=>s.feedCount>=20},
  {id:'best_friend',icon:'💕',name:'亲密好友',desc:'亲密度达到 100',check:s=>s.love>=100},
  {id:'code_20',icon:'💻',name:'代码高手',desc:'编程 20 次',check:s=>s.codeCount>=20},
  {id:'rich',icon:'💰',name:'小富翁',desc:'累计获得 500 金币',check:s=>s.totalCoins>=500},
  {id:'mega_rich',icon:'👑',name:'百万富翁',desc:'累计获得 2000 金币',check:s=>s.totalCoins>=2000},
  {id:'max_level',icon:'🌟',name:'猫中之王',desc:'达到最高等级',check:s=>s.level>=levelNames.length},
  {id:'collector',icon:'🎭',name:'收藏家',desc:'购买所有配饰',check:s=>s.ownedAccessories.length>=8},
  {id:'game_50',icon:'🎮',name:'捕鱼达人',desc:'小游戏得分 50+',check:s=>s.gameHighScore>=50},
  {id:'streak_7',icon:'🔥',name:'全勤猫奴',desc:'连续访问 7 天',check:s=>s.streak>=7},
  {id:'diary_20',icon:'📖',name:'日记达人',desc:'写下 20 篇日记',check:s=>s.diary.length>=20},
  {id:'pet_50',icon:'🤗',name:'撸猫狂魔',desc:'撸猫 50 次',check:s=>s.petCount>=50},
  {id:'sleep_10',icon:'😴',name:'催眠大师',desc:'让猫咪睡觉 10 次',check:s=>s.sleepCount>=10},
];

function checkAchievements(){
  achievementDefs.forEach(a=>{
    if(!state.achievements.includes(a.id)&&a.check(state)){
      state.achievements.push(a.id);
      showToast(`🏆 解锁成就：${a.name}！`,'achieve');
      playAchieve();addCoins(20);
      addDiary(`🏆 解锁成就「${a.name}」！获得 20 金币奖励`);
    }
  });
}

function renderAchievements(){
  const body=document.getElementById('achieveBody');
  body.innerHTML=achievementDefs.map(a=>{
    const unlocked=state.achievements.includes(a.id);
    return `<div class="achieve-item ${unlocked?'unlocked':'locked'}"><div class="achieve-icon">${unlocked?a.icon:'🔒'}</div><div class="achieve-info"><h4>${a.name}</h4><p>${a.desc}</p></div></div>`;
  }).join('');
}

// ===================== SHOP =====================
const shopItems=[
  {id:'fish',icon:'🐟',name:'小鱼干',desc:'饱腹 +25',price:10,type:'consumable',effect:s=>{s.hunger=clamp(s.hunger+25);}},
  {id:'catnip',icon:'🌿',name:'猫薄荷',desc:'心情 +25',price:15,type:'consumable',effect:s=>{s.happy=clamp(s.happy+25);}},
  {id:'coffee',icon:'☕',name:'猫咪咖啡',desc:'精力 +30',price:20,type:'consumable',effect:s=>{s.energy=clamp(s.energy+30);}},
  {id:'cake',icon:'🎂',name:'小蛋糕',desc:'全属性 +15',price:30,type:'consumable',effect:s=>{s.hunger=clamp(s.hunger+15);s.happy=clamp(s.happy+15);s.energy=clamp(s.energy+15);s.love=clamp(s.love+15);}},
  {id:'crown',icon:'👑',name:'皇冠',desc:'尊贵的金色皇冠',price:100,type:'accessory'},
  {id:'bowtie',icon:'🎀',name:'领结',desc:'绅士风度的领结',price:80,type:'accessory'},
  {id:'glasses',icon:'🕶️',name:'墨镜',desc:'酷酷的像素墨镜',price:120,type:'accessory'},
  {id:'scarf',icon:'🧣',name:'围巾',desc:'暖暖的红围巾',price:90,type:'accessory'},
  {id:'partyhat',icon:'🎉',name:'派对帽',desc:'五彩缤纷的派对帽',price:150,type:'accessory'},
  {id:'wizardhat',icon:'🧙',name:'巫师帽',desc:'神秘的魔法帽',price:200,type:'accessory'},
  {id:'flower',icon:'🌸',name:'小花',desc:'可爱的头花',price:60,type:'accessory'},
  {id:'halo',icon:'😇',name:'光环',desc:'天使的光环',price:250,type:'accessory'},
];

function renderShop(){
  const body=document.getElementById('shopBody');
  const consumables=shopItems.filter(i=>i.type==='consumable');
  const accessories=shopItems.filter(i=>i.type==='accessory');
  let html='<div class="shop-section">🍱 消耗品</div>';
  html+=consumables.map(i=>`<div class="shop-item"><div class="shop-item-info"><div class="shop-item-icon">${i.icon}</div><div class="shop-item-detail"><h4>${i.name}</h4><p>${i.desc}</p></div></div><button class="shop-buy-btn" onclick="buyItem('${i.id}')" ${state.coins<i.price?'disabled':''}>${i.price} 🪙</button></div>`).join('');
  html+='<div class="shop-section">👗 配饰</div>';
  html+=accessories.map(i=>{
    const owned=state.ownedAccessories.includes(i.id);
    return `<div class="shop-item"><div class="shop-item-info"><div class="shop-item-icon">${i.icon}</div><div class="shop-item-detail"><h4>${i.name}</h4><p>${i.desc}</p></div></div><button class="shop-buy-btn ${owned?'owned':''}" onclick="${owned?'':`buyItem('${i.id}')`}" ${owned?'':''}${!owned&&state.coins<i.price?'disabled':''}>${owned?'✓ 已拥有':i.price+' 🪙'}</button></div>`;
  }).join('');
  body.innerHTML=html;
}

function buyItem(id){
  const item=shopItems.find(i=>i.id===id);if(!item)return;
  if(state.coins<item.price){showToast('金币不够喵~','info');return;}
  state.coins-=item.price;
  if(item.type==='consumable'){
    item.effect(state);updateBars();
    showToast(`使用了 ${item.name}！`,'coin');
    addDiary(`🛒 使用了${item.name}`);
    playEat();
  }else{
    if(!state.ownedAccessories.includes(id)){
      state.ownedAccessories.push(id);
      showToast(`获得配饰：${item.name}！`,'achieve');
      addDiary(`🎁 购买了配饰「${item.name}」`);
      playAchieve();
      renderAccessoryBar();
    }
  }
  updateCoins();renderShop();checkAchievements();saveState();
}

// ===================== ACCESSORY BAR =====================
function renderAccessoryBar(){
  const bar=document.getElementById('accessoryBar');
  const accItems=shopItems.filter(i=>i.type==='accessory');
  let html='';
  html+=`<button class="acc-btn ${!state.activeAccessory?'active':''}" onclick="setAccessory(null)" title="无配饰">✕</button>`;
  accItems.forEach(i=>{
    const owned=state.ownedAccessories.includes(i.id);
    const active=state.activeAccessory===i.id;
    html+=`<button class="acc-btn ${active?'active':''} ${owned?'':'locked'}" onclick="${owned?`setAccessory('${i.id}')`:'toggleModal(\'shop\')'}" title="${i.name}">${i.icon}</button>`;
  });
  bar.innerHTML=html;
}
function setAccessory(id){
  state.activeAccessory=id;renderAccessoryBar();renderCat();saveState();
}

// ===================== MODALS =====================
function toggleModal(name){
  const overlay=document.getElementById(name+'Overlay');
  const showing=overlay.classList.contains('show');
  document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('show'));
  if(!showing){
    overlay.classList.add('show');
    if(name==='shop')renderShop();
    if(name==='achieve')renderAchievements();
    if(name==='diary')renderDiary();
  }
}
function closeModalOnBg(e,name){if(e.target===e.currentTarget)toggleModal(name);}

// ===================== ACTIONS =====================
function doAction(cb){
  if(state.busy)return;
  state.busy=true;cb();
  updateBars();updateExpression();updateLevel();updateCoins();renderCat();
  checkAchievements();saveState();
  setTimeout(()=>{state.busy=false;},800);
}

function feed(){doAction(()=>{
  if(state.sleeping){showThought('zzZ...别吵喵...');setMood('猫咪在睡觉，别打扰它~ 💤');return;}
  if(state.hunger>=100){showThought('吃不下了喵...');setMood('猫咪已经饱饱的了！');return;}
  state.hunger=clamp(state.hunger+20);state.happy=clamp(state.happy+5);state.exp+=3;state.feedCount++;
  addCoins(2);
  currentExpression='eating';renderCat();
  if(eatingTimeout)clearTimeout(eatingTimeout);
  eatingTimeout=setTimeout(()=>{currentExpression='normal';updateExpression();renderCat();},1500);
  floatEmoji('🐟');animatePet('bounce');showThought('好吃喵！🐟');setMood('猫咪吃得很开心！呼噜呼噜~');
  addDiary('🐟 给猫咪喂了小鱼，吃得好香~');playEat();
});}

function play(){doAction(()=>{
  if(state.sleeping){showThought('zzZ...');setMood('猫咪在睡觉呢~');return;}
  if(state.energy<15){showThought('太累了喵...');setMood('猫咪太累了，需要休息！');return;}
  state.happy=clamp(state.happy+20);state.energy=clamp(state.energy-15);state.hunger=clamp(state.hunger-8);
  state.love=clamp(state.love+5);state.exp+=5;state.playCount++;
  addCoins(3);
  currentExpression='playing';renderCat();
  setTimeout(()=>{if(currentExpression==='playing'){currentExpression='normal';updateExpression();renderCat();}},2500);
  floatEmoji('🧶');floatEmoji('⭐');animatePet('wiggle');showThought(rnd(thoughts.happy));setMood('猫咪和包子鸭玩得不亦乐乎！🧶');
  addDiary('🧶 和猫咪玩毛线球，好开心！');playMeow();
});}

function sleep(){doAction(()=>{
  if(state.sleeping){
    state.sleeping=false;currentExpression='normal';
    showThought('喵~早安！☀️');setMood('猫咪伸了个大懒腰，醒了！');clearZzz();
    addDiary('☀️ 猫咪睡醒了，精神满满！');return;
  }
  state.sleeping=true;state.energy=clamp(state.energy+30);state.exp+=2;state.sleepCount++;
  currentExpression='sleepy';showThought('晚安喵...💤');setMood('猫咪蜷成一团，呼呼大睡~ zzZ...');startZzz();
  addDiary('💤 猫咪睡着了，呼呼~');playPurr();
});}

let zzzInterval;
function startZzz(){
  const s=document.getElementById('petScene');
  zzzInterval=setInterval(()=>{const z=document.createElement('div');z.className='zzz';z.textContent='Z';z.style.left='65%';z.style.top='25%';z.style.animationDelay=Math.random()*.5+'s';s.appendChild(z);setTimeout(()=>z.remove(),2000);},1200);
}
function clearZzz(){clearInterval(zzzInterval);document.querySelectorAll('.zzz').forEach(z=>z.remove());}

function pet(){doAction(()=>{
  if(state.sleeping){state.sleeping=false;currentExpression='normal';clearZzz();showThought('喵?! 被摸醒了 😳');setMood('猫咪被你摸醒了！');return;}
  state.love=clamp(state.love+10);state.happy=clamp(state.happy+8);state.exp+=4;state.petCount++;
  addCoins(2);
  currentExpression='love';renderCat();
  setTimeout(()=>{if(currentExpression==='love'){currentExpression='normal';updateExpression();renderCat();}},2000);
  floatEmoji('❤️');animatePet('wiggle');
  showThought(rnd(['呼噜呼噜~ ❤️','蹭蹭...😊','再摸摸喵~','最喜欢你了喵！']));
  setMood('猫咪开心地呼噜呼噜~ 💕');
  addDiary('🤗 撸了撸猫咪，它开心地呼噜~');playPurr();
});}

function code(){doAction(()=>{
  if(state.sleeping){showThought('梦里在debug喵...');setMood('猫咪连做梦都在踩键盘 😂');return;}

  state.love=clamp(state.love+3);state.exp+=8;state.codeCount++;
  addCoins(5);
  currentExpression='coding';renderCat();
  setTimeout(()=>{if(currentExpression==='coding'){currentExpression='normal';updateExpression();renderCat();}},3000);
  floatEmoji('💻');floatEmoji('✨');animatePet('bounce');showThought(rnd(thoughts.code));setMood('猫咪在键盘上疯狂踩踩！代码质量 MAX！');
  addDiary('💻 猫咪帮忙写代码，产出爆表！');playMeow();
});}

function petClick(){
  if(state.busy||state.sleeping)return;
  floatEmoji('✨');animatePet('bounce');showThought(rnd(thoughts.idle));playMeow();
}

// ===================== DAY/NIGHT CYCLE =====================
function updateTimeOfDay(){
  const h=new Date().getHours();
  let period,icon,label;
  if(h>=6&&h<9){period='dawn';icon='🌅';label='清晨';}
  else if(h>=9&&h<17){period='day';icon='☀️';label='白天';}
  else if(h>=17&&h<20){period='dusk';icon='🌇';label='黄昏';}
  else{period='night';icon='🌙';label='夜晚';}
  document.getElementById('timeBadge').textContent=icon+' '+label;
  const stars=document.getElementById('stars');
  stars.style.opacity=(period==='night'||period==='dusk')?'1':'0.3';
  document.getElementById('sunRays').style.display=(period==='day')?'block':'none';
}

// ===================== WEATHER SYSTEM =====================
const weathers=['sunny','rainy','snowy','cloudy'];
function setWeather(w){
  state.weather=w;
  const layer=document.getElementById('weatherLayer');
  layer.innerHTML='';
  const badge=document.getElementById('weatherBadge');
  switch(w){
    case 'sunny':badge.textContent='☀️ 晴天';break;
    case 'rainy':
      badge.textContent='🌧️ 下雨';
      for(let i=0;i<40;i++){
        const drop=document.createElement('div');drop.className='raindrop';
        const h=Math.random()*20+10;
        drop.style.cssText=`left:${Math.random()*100}%;height:${h}px;animation-duration:${Math.random()*0.5+0.4}s;animation-delay:${Math.random()*2}s;opacity:${Math.random()*0.4+0.3};`;
        layer.appendChild(drop);
      }break;
    case 'snowy':
      badge.textContent='🌨️ 下雪';
      for(let i=0;i<30;i++){
        const flake=document.createElement('div');flake.className='snowflake';
        const sz=Math.random()*4+2;
        flake.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;animation-duration:${Math.random()*3+4}s;animation-delay:${Math.random()*5}s;`;
        layer.appendChild(flake);
      }break;
    case 'cloudy':badge.textContent='☁️ 多云';break;
  }
}

function randomWeather(){
  const w=weathers[Math.floor(Math.random()*weathers.length)];
  if(w!==state.weather){setWeather(w);addDiary(`🌤️ 天气变成了${document.getElementById('weatherBadge').textContent}`);}
}

// ===================== STARS =====================
function createStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<50;i++){
    const s=document.createElement('div');s.className='star';const z=Math.random()*3+1;
    s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--duration:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s;`;
    c.appendChild(s);
  }
}

// ===================== MINIGAME =====================
let gameRunning=false,gameRaf,gameTimerInterval;
const GW=300,GH=400;
const gCanvas=document.getElementById('gameCanvas');
const gCtx=gCanvas.getContext('2d');

let gameCat={x:135,w:30,h:20};
let gameFishes=[],gameBombs=[];
let gameScore=0,gameTime=30;
let gameKeys={left:false,right:false};

function startMinigame(){
  if(gameRunning)return;
  gameRunning=true;gameScore=0;gameTime=30;
  gameFishes=[];gameBombs=[];gameCat.x=135;
  document.getElementById('gameOverlay').classList.add('show');
  document.getElementById('gameOverScreen').classList.remove('show');
  document.getElementById('gameHud').style.display='flex';
  gCanvas.style.display='block';
  document.getElementById('gameScore').textContent='0';
  document.getElementById('gameTimer').textContent='30';

  gameTimerInterval=setInterval(()=>{
    gameTime--;document.getElementById('gameTimer').textContent=gameTime;
    if(gameTime<=0)endMinigame();
  },1000);
  gameLoop();
}

function endMinigame(){
  gameRunning=false;cancelAnimationFrame(gameRaf);clearInterval(gameTimerInterval);
  const earned=Math.floor(gameScore*2);
  if(gameScore>state.gameHighScore)state.gameHighScore=gameScore;
  document.getElementById('gameFinalScore').textContent=gameScore;
  document.getElementById('gameCoinEarned').textContent=earned;
  document.getElementById('gameHud').style.display='none';
  gCanvas.style.display='none';
  document.getElementById('gameOverScreen').classList.add('show');
  addCoins(earned);addDiary(`🎮 玩了接鱼游戏，捕到 ${gameScore} 条鱼，获得 ${earned} 金币！`);
  checkAchievements();saveState();
}

function closeMinigame(){
  if(gameRunning){gameRunning=false;cancelAnimationFrame(gameRaf);clearInterval(gameTimerInterval);}
  document.getElementById('gameOverlay').classList.remove('show');
}

function gameLoop(){
  if(!gameRunning)return;
  gCtx.clearRect(0,0,GW,GH);

  if(Math.random()<0.04)gameFishes.push({x:Math.random()*(GW-12),y:-12,w:12,h:8,speed:Math.random()*2+2});
  if(Math.random()<0.015)gameBombs.push({x:Math.random()*(GW-10),y:-10,w:10,h:10,speed:Math.random()*2+1.5});

  if(gameKeys.left)gameCat.x=Math.max(0,gameCat.x-4);
  if(gameKeys.right)gameCat.x=Math.min(GW-gameCat.w,gameCat.x+4);

  // Touch/mouse control
  if(gameTouchX!==null)gameCat.x=Math.max(0,Math.min(GW-gameCat.w,gameTouchX-gameCat.w/2));

  gameFishes=gameFishes.filter(f=>{
    f.y+=f.speed;
    if(f.y>GH)return false;
    if(f.x<gameCat.x+gameCat.w&&f.x+f.w>gameCat.x&&f.y+f.h>GH-gameCat.h-5&&f.y<GH){
      gameScore++;document.getElementById('gameScore').textContent=gameScore;playCoin();return false;
    }
    return true;
  });

  gameBombs=gameBombs.filter(b=>{
    b.y+=b.speed;
    if(b.y>GH)return false;
    if(b.x<gameCat.x+gameCat.w&&b.x+b.w>gameCat.x&&b.y+b.h>GH-gameCat.h-5&&b.y<GH){
      gameTime=Math.max(0,gameTime-5);document.getElementById('gameTimer').textContent=gameTime;return false;
    }
    return true;
  });

  // Draw water bg
  gCtx.fillStyle='rgba(30,80,130,0.3)';
  for(let y=0;y<GH;y+=20){gCtx.fillRect(0,y,GW,10);}

  // Draw fishes
  gCtx.fillStyle='#f0a050';
  gameFishes.forEach(f=>{
    gCtx.fillRect(f.x,f.y,f.w,f.h);
    gCtx.fillStyle='#ff8888';gCtx.fillRect(f.x+f.w-3,f.y,3,f.h);gCtx.fillStyle='#f0a050';
    gCtx.fillStyle='#333';gCtx.fillRect(f.x+2,f.y+2,2,2);gCtx.fillStyle='#f0a050';
  });

  // Draw bombs
  gCtx.fillStyle='#333';
  gameBombs.forEach(b=>{
    gCtx.fillRect(b.x,b.y,b.w,b.h);
    gCtx.fillStyle='#ff0000';gCtx.fillRect(b.x+3,b.y+2,4,4);gCtx.fillStyle='#333';
  });

  // Draw cat at bottom
  const cy=GH-gameCat.h-2;
  gCtx.fillStyle='#f0a050';gCtx.fillRect(gameCat.x,cy,gameCat.w,gameCat.h);
  gCtx.fillStyle='#fff8f0';gCtx.fillRect(gameCat.x+8,cy+12,14,8);
  gCtx.fillStyle='#2b2b2b';
  gCtx.fillRect(gameCat.x+6,cy+6,3,3);gCtx.fillRect(gameCat.x+20,cy+6,3,3);
  gCtx.fillStyle='#e06080';gCtx.fillRect(gameCat.x+12,cy+9,4,2);
  gCtx.fillStyle='#f0a050';
  gCtx.fillRect(gameCat.x+2,cy-6,4,6);gCtx.fillRect(gameCat.x+24,cy-6,4,6);

  gameRaf=requestAnimationFrame(gameLoop);
}

let gameTouchX=null;
gCanvas.addEventListener('touchmove',e=>{e.preventDefault();const r=gCanvas.getBoundingClientRect();const t=e.touches[0];gameTouchX=(t.clientX-r.left)*(GW/r.width);},{passive:false});
gCanvas.addEventListener('touchend',()=>{gameTouchX=null;});
gCanvas.addEventListener('mousemove',e=>{if(!gameRunning)return;const r=gCanvas.getBoundingClientRect();gameTouchX=(e.clientX-r.left)*(GW/r.width);});
gCanvas.addEventListener('mouseleave',()=>{gameTouchX=null;});

document.addEventListener('keydown',e=>{
  if(!gameRunning)return;
  if(e.key==='ArrowLeft'||e.key==='a')gameKeys.left=true;
  if(e.key==='ArrowRight'||e.key==='d')gameKeys.right=true;
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')gameKeys.left=false;
  if(e.key==='ArrowRight'||e.key==='d')gameKeys.right=false;
});

// ===================== PERIODIC UPDATES =====================
setInterval(()=>{
  if(state.sleeping){state.energy=clamp(state.energy+2);}
  else{state.hunger=clamp(state.hunger-1.5);state.happy=clamp(state.happy-.8);state.energy=clamp(state.energy-.5);}
  updateBars();updateExpression();renderCat();
  addCoins(1);
  saveState();
},5000);

setInterval(()=>{
  if(state.busy||state.sleeping)return;
  if(state.hunger<20){showThought(rnd(thoughts.hungry));setMood('猫咪饿了，快喂喂它！🐟');}
  else if(state.energy<20){showThought(rnd(thoughts.tired));setMood('猫咪累了，让它休息一下吧~ 💤');}
  else if(state.happy<30){showThought(rnd(thoughts.sad));setMood('猫咪不太开心，陪它玩玩吧~');}
  else{showThought(rnd(thoughts.idle));}
},12000);

setInterval(randomWeather,120000);
setInterval(updateTimeOfDay,60000);

function switchTab(tab){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab'+(tab==='interact'?'Interact':'More')).classList.add('active');
  document.getElementById('tabBtn'+(tab==='interact'?'Interact':'More')).classList.add('active');
}

// ===================== INIT =====================
createStars();
updateBars();updateExpression();updateCoins();updateStreak();updateTimeOfDay();
setWeather(state.weather||'sunny');
renderAccessoryBar();
renderCat();
if(state.soundOn)document.getElementById('soundBtn').textContent='🔊';
if(state.sleeping)startZzz();

window.addEventListener('beforeunload',saveState);
setInterval(saveState,15000);
</script>
